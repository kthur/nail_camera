name: Android CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    - name: Build Debug & Release APK
      run: |
        ./gradlew assembleDebug
        ./gradlew assembleRelease

    - name: Generate Release Keystore and Sign Release APK
      run: |
        keytool -genkeypair -alias releasekey -keyalg RSA -keysize 2048 -validity 10000 -keystore release.keystore -storepass password -keypass password -dname "CN=NailNutri, O=NailNutri, C=KR"
        jarsigner -keystore release.keystore -storepass password -keypass password app/build/outputs/apk/release/app-release-unsigned.apk releasekey
        mv app/build/outputs/apk/release/app-release-unsigned.apk app/build/outputs/apk/release/app-release.apk

    - name: Upload APK Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: app-apks
        path: |
          app/build/outputs/apk/debug/app-debug.apk
          app/build/outputs/apk/release/app-release.apk

    - name: Create or Update Release
      uses: ncipollo/release-action@v1
      with:
        artifacts: "app/build/outputs/apk/debug/app-debug.apk,app/build/outputs/apk/release/app-release.apk"
        tag: "latest"
        name: "Latest Signed Build"
        body: "Automated signed release and debug build APKs from GitHub Actions."
        allowUpdates: true
        removeArtifacts: true
        token: ${{ secrets.GITHUB_TOKEN }}
