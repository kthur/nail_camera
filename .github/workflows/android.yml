name: Android CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    - name: Ensure Debug Keystore exists for signing
      run: |
        mkdir -p ~/.android
        if [ ! -f ~/.android/debug.keystore ]; then
          keytool -genkeypair -alias androiddebugkey -keyalg RSA -keysize 2048 -validity 10000 \
            -keystore ~/.android/debug.keystore -storepass android -keypass android \
            -dname "CN=Android Debug, O=Android, C=US"
        fi

    - name: Build Debug APK
      run: ./gradlew assembleDebug

    - name: Upload to Firebase App Distribution
      if: github.event_name != 'pull_request'
      uses: wzieba/Firebase-Distribution-Github-Action@v1.7.0
      with:
        appId: ${{ secrets.FIREBASE_APP_ID }}
        serviceCredentialsFileContent: ${{ secrets.CREDENTIAL_FILE_CONTENT }}
        groups: testers
        file: app/build/outputs/apk/debug/app-debug.apk

    - name: Build Release APK (signed)
      run: ./gradlew assembleRelease

    - name: Upload APK Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: app-apks
        path: |
          app/build/outputs/apk/debug/app-debug.apk
          app/build/outputs/apk/release/app-release.apk

    - name: Create or Update Release
      uses: ncipollo/release-action@v1
      with:
        artifacts: "app/build/outputs/apk/debug/app-debug.apk,app/build/outputs/apk/release/app-release.apk"
        tag: "latest"
        name: "Latest Signed Build"
        body: "Automated signed release and debug build APKs from GitHub Actions."
        allowUpdates: true
        removeArtifacts: true
        replacesArtifacts: true
        token: ${{ secrets.GITHUB_TOKEN }}
